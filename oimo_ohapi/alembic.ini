[alembic]
script_location = migrations
sqlalchemy.url = postgresql+psycopg://oimo:oimo@localhost:5432/ohapi

[loggers]
keys = root
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = INFO
handlers = console
[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic
[formatter_generic]
format = %(levelname)s [%(name)s] %(message)s
