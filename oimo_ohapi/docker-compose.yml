services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: oimo
      POSTGRES_PASSWORD: oimo
      POSTGRES_DB: ohapi
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  api:
    build: .
    env_file: .env
    depends_on: [postgres, redis, minio]
    ports: ["8080:8080"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080

  worker:
    build: .
    env_file: .env
    depends_on: [redis, postgres, minio]
    # In production, run this on the GPU pod with COMFYUI_URL pointing local
    command: celery -A app.workers.celery_app worker --loglevel=info -Q gpu --concurrency=2

volumes:
  pgdata: {}
  miniodata: {}
